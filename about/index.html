<!DOCTYPE html>
<html>
  <head>
      <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>about me</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

   body {
  background: linear-gradient(
    -45deg,
    #0f172a,
    #1e3a8a,
    #7c3aed,
    #0ea5e9
  );

  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;

  min-height: 100vh;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}


@keyframes gradientMove {
  0% {
    background-position: 0% 50%;
  }

  50% {
    background-position: 100% 50%;
  }

  100% {
    background-position: 0% 50%;
  }
}

    .hero {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.9;
    }
  </style>
  </head>
  <body>
    <section class='hero"> 
      <h1>about me.</h1>
      <p>
        hello. i am a youtuber and i wanted to make this website for several reasons.
        first, i just kinda wanted a website.
        second, i've been really into coding for a while now, and i decided to actually buy a website
        instead of using github/cloudflare pages. 
        third, i wanted a place where i could put games onto for school purposes, since they block everything.
        <br>
        (yes i know chrome extensions exist, but they could always block it)
        <br>
        anyway that's all, thanks for reading!
      </p>
    </section>
  </body>
</html>
