<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>絵マジで、男🫨</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .hero {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: white;
      color: #4f46e5;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      background: #f3f4f6;
    }
  </style>
</head>

<body>
  <section class="hero">
    <h1>welcome to my website 👋</h1>

    <p>
      work in progress. this is just a simple landing page while
       i code more.<br><br>
      🎮 games coming soon! (not)
    </p>

    <a href="/updates" class="btn">see my latest updates </a>
  </section>
</body>
</html>
