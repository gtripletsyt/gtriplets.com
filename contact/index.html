<!DOCTYPE html>
<html>
  <head>
      <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>about me</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

   body {
  background: linear-gradient(
    -45deg,
    #ff0000,
    #00ff00,
    #0000ff,
    #000000
  );

  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;

  min-height: 100vh;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}


@keyframes gradientMove {
  0% {
    background-position: 0% 50%;
  }

  50% {
    background-position: 100% 50%;
  }

  100% {
    background-position: 0% 50%;
  }
}
    .hero {
  width: 600px;
  overflow-wrap: break-word;
}


    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.9;
    }
  </style>
  </head>
  <body>
    <section class="hero"> 
      <h1>contact</h1>
      <p>
        contact me at gtripletsyt@gmail.com, 
      </p>
    </section>
  </body>
</html>
