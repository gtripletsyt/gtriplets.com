<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>latest updates</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      padding: 40px;
    }

    .commit {
      background: #1f2937;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
    }

    a {
      color: #60a5fa;
    }
  </style>
</head>

<body>

<h1>latest site updates</h1>
<div id="commits">Loading...</div>

<script>
const username = "GTrip123";
const repo = "gtriplets.com";

fetch(`https://api.github.com/repos/${username}/${repo}/commits`)
  .then(response => response.json())
  .then(commits => {
    const container = document.getElementById("commits");

    container.innerHTML = "";

    commits.slice(0, 5).forEach(commit => {
      container.innerHTML += `
        <div class="commit">
          <h3>${commit.commit.message}</h3>
          <p>
            By ${commit.commit.author.name}
            <br>
            ${new Date(commit.commit.author.date).toLocaleString()}
          </p>
          <a href="${commit.html_url}" target="_blank">
            View commit
          </a>
        </div>
      `;
    });
  })
  .catch(() => {
    document.getElementById("commits").innerHTML =
      "Failed to load updates.";
  });
</script>

</body>
</html>
